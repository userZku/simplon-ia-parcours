name: M0-B2 Pytest CI

on:
  push:
    branches: [main]
    paths:
      - "module-00/M0-B2/squelette/services/api-nlp/**"
      - ".github/workflows/pytest-m0-b2.yml"
      - ".github/workflows/_python-pytest-reusable.yml"
  pull_request:
    branches: [main]
    paths:
      - "module-00/M0-B2/squelette/services/api-nlp/**"
      - ".github/workflows/pytest-m0-b2.yml"
      - ".github/workflows/_python-pytest-reusable.yml"

jobs:
  test:
    uses: ./.github/workflows/_python-pytest-reusable.yml
    with:
      job-name: M0-B2 api-nlp tests
      working-directory: module-00/M0-B2/squelette/services/api-nlp
      python-version: "3.11"
      pytest-command: pytest -q
